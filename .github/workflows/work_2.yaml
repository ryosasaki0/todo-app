name: work_2

on:
  push:
    branches:
      - main
    paths:
      - 'work_2/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Run lint
        run: docker run --rm todo-app ruff check .

      - name: Run tests
        run: docker run --rm todo-app pytest
