name: work_3

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'work_3/**'
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t todo-app ./work_3

      - name: Run lint
        run: docker run --rm todo-app ruff check .

      - name: Run tests
        run: docker run --rm -e PYTHONPATH=/app todo-app pytest

  request-copilot-review:
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Assign Copilot as a reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ここに --repo ${{ github.repository }} を追加しました
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-reviewer @copilot
